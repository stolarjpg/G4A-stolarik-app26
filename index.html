<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Objednávka e-shopu</title>
<style>
body {background:#9a9162;font-family:Arial;}
h1 {background:#433ee1;color:white;padding:20px;text-align:center;}
.container {max-width:500px;margin:30px auto;background:white;padding:25px;border-radius:12px;}
.item {display:flex;justify-content:space-between;margin:12px 0;}
#celkem,#pocet {color:#011047;font-weight:bold;text-align:center;}
button {background:#395d4f;color:white;padding:15px;width:100%;}
button:hover {background:#4bca37;}
</style>
</head>
<body>
<h1>SŠ Kostka – OBJEDNÁVKY E-SHOP</h1>
<div class="container">
<div id="items"></div>
<div id="celkem">Celková cena: 0 Kč</div>
<div id="pocet">Počet kusů: 0</div>
<input id="jmeno" placeholder="Jméno">
<input id="telefon" placeholder="Telefon">
<button onclick="odeslatObjednavku()">ODESLAT</button>
</div>
<script>
let items=[];
async function loadCSV(){const r=await fetch('data_eshop.csv');const t=await r.text();parseCSV(t);renderItems();}
function parseCSV(t){items=[];t.split('
').slice(1).forEach(l=>{if(!l)return;let[n,c]=l.split(';');items.push({nazev:n,cena:parseFloat(c),mnozstvi:0});});}
function renderItems(){let c=document.getElementById('items');c.innerHTML='';items.forEach((it,i)=>{let d=document.createElement('div');d.className='item';d.innerHTML=`<span>${it.nazev} (${it.cena} Kč)</span><input type="number" onchange="updateItem(${i},this.value)">`;c.appendChild(d);});}
function updateItem(i,v){items[i].mnozstvi=parseInt(v)||0;updateSummary();}
function updateSummary(){let c=0,p=0;items.forEach(it=>{c+=it.cena*it.mnozstvi;p+=it.mnozstvi;});document.getElementById('celkem').innerText='Celková cena: '+c+' Kč';document.getElementById('pocet').innerText='Počet kusů: '+p;}
function odeslatObjednavku(){alert('Objednávka odeslána (demo)');}
loadCSV();
</script>
</body>
</html>
